<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DailyMeal</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FDFBF7">
    
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Шеф-Меню">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="header-title">МЕНЮ</div>
            <button class="settings-btn" id="settingsBtn" aria-label="Настройки">
                <img src="icons/settings.svg" alt="" width="22" height="22">
            </button>
        </div>
        <div class="days-nav" id="daysNav"></div>
    </header>

    <main class="container">
        <div class="day-title-display" id="dayTitleDisplay"></div>
        <div id="mealsContainer"></div>
    </main>

    <!-- Модалка настроек -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Настройки</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h4>Данные</h4>
                    <button class="settings-action-btn" id="exportBtn">
                        <img src="icons/export.svg" alt="" width="18" height="18">
                        Выгрузить прогресс (.json)
                    </button>
                    <button class="settings-action-btn" id="importBtn">
                        <img src="icons/import.svg" alt="" width="18" height="18">
                        Загрузить backup (.json)
                    </button>
                    <input type="file" id="importFileInput" accept=".json" hidden>
                    <button class="settings-action-btn danger" id="clearBtn">
                        Очистить весь прогресс
                    </button>
                </div>
                <div class="settings-section">
                    <h4>Информация</h4>
                    <p class="settings-info">Версия: 1.0.0</p>
                    <p class="settings-info" id="menuVersion">Меню: загрузка...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
