<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>DailyMeal</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap"
      rel="stylesheet"
    />

    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#FDFBF7" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Шеф-Меню" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />

    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <div class="header-top">
        <div class="header-title chiron-goround-tc-main">МЕНЮ</div>
        <button class="settings-btn" id="settingsBtn" aria-label="Настройки">
          <img src="icons/settings.svg" alt="" width="26" height="26" />
        </button>
      </div>
      <div class="days-nav" id="daysNav"></div>
    </header>

    <!-- Пустое состояние (когда меню не загружено) -->
    <div class="empty-state" id="emptyState" style="display: none">
      <div class="empty-icon">🍽️</div>
      <h2>Меню не загружено</h2>
      <p>Импортируйте JSON-файл с меню, чтобы начать</p>
      <button class="primary-btn" id="emptyImportBtn">
        <img src="icons/import_white.svg" alt="" width="20" height="20" />
        Импортировать меню
      </button>
    </div>

    <main class="container" id="mainContainer">
      <div class="day-title-display" id="dayTitleDisplay"></div>
      <div id="mealsContainer"></div>
    </main>

    <!-- Модалка настроек -->
    <div class="modal-overlay" id="settingsModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Настройки</h3>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <div class="modal-body">
          <div class="settings-section">
            <h4>Меню</h4>
            <button class="settings-action-btn" id="importMenuBtn">
              <img src="icons/import_black.svg" alt="" width="20" height="20" />
              Импортировать меню (.json)
            </button>
            <button class="settings-action-btn" id="exportMenuBtn">
              <img src="icons/export.svg" alt="" width="20" height="20" />
              Сохранить текущее меню (.json)
            </button>
            <input type="file" id="importMenuFileInput" accept=".json" hidden />
            <p class="settings-info" id="menuStatus">Меню: не загружено</p>
          </div>
          <div class="settings-section">
            <h4>Прогресс (галочки)</h4>
            <button class="settings-action-btn" id="exportProgressBtn">
              <img src="icons/export.svg" alt="" width="20" height="20" />
              Выгрузить прогресс (.json)
            </button>
            <button class="settings-action-btn" id="importProgressBtn">
              <img src="icons/import_black.svg" alt="" width="20" height="20" />
              Загрузить прогресс (.json)
            </button>
            <input
              type="file"
              id="importProgressFileInput"
              accept=".json"
              hidden
            />
          </div>
          <div class="settings-section">
            <h4>Данные</h4>
            <button class="settings-action-btn danger" id="clearAllBtn">
              <img src="icons/trashbin.svg" alt="" width="20" height="20" />
              Удалить все
            </button>
          </div>
          <div class="settings-section">
            <h4>Информация</h4>
            <p class="settings-info">Версия: 2.0.0</p>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
