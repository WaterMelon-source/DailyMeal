<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Шеф-Меню</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Шеф-Меню" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-theme="dark">
    <!-- Экран меню -->
    <div id="menuScreen" class="screen active">
      <header>
        <div class="days-nav" id="daysNav"></div>
      </header>
      <main class="container">
        <div class="day-title-display" id="dayTitleDisplay"></div>
        <div id="mealsContainer"></div>
      </main>
    </div>

    <!-- Экран настроек -->
    <div id="settingsScreen" class="screen">
      <div class="settings-bg">
        <img src="icons/leaf.svg" alt="" class="leaf-decoration" />
      </div>
      <div class="settings-content">
        <h1 class="settings-title">НАСТРОЙКИ</h1>

        <div class="settings-section">
          <h2 class="settings-section-title">
            МЕНЮ
            <span class="settings-status" id="menuStatus">• не загружено</span>
          </h2>
          <button class="settings-btn" id="importMenuBtn">
            <img src="icons/import.svg" alt="" width="20" height="20" />
            Импортировать меню (.json)
          </button>
          <button class="settings-btn" id="exportMenuBtn">
            <img src="icons/export.svg" alt="" width="20" height="20" />
            Сохранить текущее меню (.json)
          </button>
          <input type="file" id="importMenuFileInput" accept=".json" hidden />
        </div>

        <div class="settings-section">
          <h2 class="settings-section-title">ПРОГРЕСС</h2>
          <button class="settings-btn" id="exportProgressBtn">
            <img src="icons/export.svg" alt="" width="20" height="20" />
            Выгрузить прогресс (.json)
          </button>
          <button class="settings-btn" id="importProgressBtn">
            <img src="icons/import.svg" alt="" width="20" height="20" />
            Загрузить прогресс (.json)
          </button>
          <input
            type="file"
            id="importProgressFileInput"
            accept=".json"
            hidden
          />
        </div>

        <div class="settings-section">
          <h2 class="settings-section-title">ТЕМА</h2>
          <button class="settings-btn" id="themeToggleBtn">
            <img src="icons/theme.svg" alt="" width="20" height="20" />
            <span id="themeLabel">Светлая тема</span>
          </button>
        </div>

        <div class="settings-section">
          <h2 class="settings-section-title">ДАННЫЕ</h2>
          <button class="settings-btn danger" id="clearAllBtn">
            <img src="icons/trash.svg" alt="" width="20" height="20" />
            Удалить все
          </button>
        </div>

        <p class="settings-version">Информация: Версия 2.0.0</p>
      </div>
    </div>

    <!-- Пустое состояние -->
    <div class="empty-state" id="emptyState" style="display: none">
      <div class="empty-icon">️</div>
      <h2>МЕНЮ НЕ ЗАГРУЖЕНО</h2>
      <p>Импортируйте JSON-файл с меню, чтобы начать</p>
      <button class="primary-btn" id="emptyImportBtn">
        <img
          src="icons/import.svg"
          class="icon-white"
          alt=""
          width="18"
          height="18"
        />
        Импортировать меню
      </button>
    </div>

    <!-- Модальное окно рецепта -->
    <div class="recipe-modal" id="recipeModal">
      <div class="recipe-modal-content">
        <button class="recipe-modal-close" id="recipeModalClose">
          <img src="icons/close.svg" alt="" width="24" height="24" />
        </button>
        <div class="recipe-modal-body" id="recipeModalBody"></div>
      </div>
    </div>

    <!-- Нижний таб-бар -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="menu" id="tabMenu">
        <img src="icons/clock.svg" alt="" width="24" height="24" />
      </button>
      <button class="tab-btn" data-tab="settings" id="tabSettings">
        <img src="icons/settings.svg" alt="" width="24" height="24" />
      </button>
    </nav>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
